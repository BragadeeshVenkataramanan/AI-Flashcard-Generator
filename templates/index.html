<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>

<meta charset="UTF-8">
<title>FLASHCARD AI</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<!-- TOP BAR -->
<div class="topbar">

<div class="container-fluid d-flex justify-content-between align-items-center">

<h2 class="logo">FLASHCARD AI</h2>

<button id="themeToggle" class="btn btn-outline-secondary btn-sm">
🌙 Dark Mode
</button>

</div>

</div>



<div class="container-fluid">

<div class="row main-layout">

<!-- LEFT PANEL -->
<div class="col-lg-4 control-panel">

<div class="panel-card">

<h5 class="mb-4">Flashcard Generator</h5>

<form method="POST" id="flashcard-form" enctype="multipart/form-data">

<label>Topic</label>
<input type="text" name="topic" class="form-control mb-3" placeholder="Neural Networks" required>

<label>Provider</label>
<select name="provider" class="form-select mb-3">
<option value="ollama">Ollama (Local)</option>
<option value="gemini">Gemini (Cloud API)</option>
</select>

<label>Number of Cards</label>
<select name="count" class="form-select mb-3">
<option>5</option>
<option>10</option>
<option>15</option>
<option>20</option>
</select>

<label>Style</label>
<select name="style" class="form-select mb-3">
<option value="standard">Standard Q/A</option>
<option value="definition">Definition-based</option>
<option value="truefalse">True / False</option>
<option value="mcq">MCQ</option>
</select>

<label>Batch Topics (CSV / TXT)</label>
<input type="file" class="form-control mb-4" name="topics_file" id="topics_file" accept=".csv,.txt">

<div class="d-grid gap-2">

<button type="submit" class="btn btn-primary">
Generate Flashcards
</button>

<button type="button" class="btn btn-outline-secondary" id="batchBtn">
Batch Generate
</button>

</div>

</form>

<div id="loading" class="d-none text-center mt-4">

<div class="spinner-border"></div>
<p class="text-muted mt-2">Generating...</p>

</div>

</div>

</div>



<!-- RIGHT PANEL -->
<div class="col-lg-8 results-panel">

{% if cards %}

<div class="results-header">

<div class="d-flex gap-2">

<button class="btn btn-outline-secondary btn-sm" id="copyBtn">
Copy
</button>

<button class="btn btn-outline-secondary btn-sm" id="downloadPdfBtn">
PDF
</button>

<button class="btn btn-outline-secondary btn-sm" id="downloadCsvBtn">
CSV
</button>

</div>

</div>


<div class="flashcard-grid">

{% for c in cards %}

<div class="flashcard">

<div class="card-inner">

<div class="card-front">

<h6>Question</h6>
<p>{{ c.question }}</p>

</div>

<div class="card-back">

<h6>Answer</h6>
<p>{{ c.answer }}</p>

</div>

</div>

</div>

{% endfor %}

</div>

{% else %}

<div class="empty-state">

<h4>No flashcards yet</h4>
<p>Generate flashcards using the panel on the left.</p>

</div>

{% endif %}

</div>

</div>

</div>



<script>

/* Dark Mode Toggle */

const toggleBtn=document.getElementById("themeToggle")

toggleBtn.addEventListener("click",()=>{

const html=document.documentElement
const theme=html.getAttribute("data-bs-theme")

if(theme==="dark"){
html.setAttribute("data-bs-theme","light")
toggleBtn.innerText="🌙 Dark Mode"
}else{
html.setAttribute("data-bs-theme","dark")
toggleBtn.innerText="☀ Light Mode"
}

})


/* Loader */

document.getElementById('flashcard-form')?.addEventListener('submit',()=>{
document.getElementById('loading')?.classList.remove('d-none')
})


/* Collect Cards */

function collectCards(){

const list=[]

document.querySelectorAll('.flashcard').forEach(card=>{

const q=card.querySelector('.card-front p')?.innerText||''
const a=card.querySelector('.card-back p')?.innerText||''

if(q||a)list.push({question:q,answer:a})

})

return list

}


/* Copy */

document.getElementById('copyBtn')?.addEventListener('click',()=>{

const cards=collectCards()

if(!cards.length)return alert("No cards")

const txt=cards.map(c=>`Q: ${c.question}\nA: ${c.answer}`).join("\n\n")

navigator.clipboard.writeText(txt)

alert("Copied!")

})


/* PDF */

document.getElementById('downloadPdfBtn')?.addEventListener('click',async()=>{

const cards=collectCards()

const res=await fetch('/export/pdf',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({title:'Flashcards',cards})
})

const blob=await res.blob()
const url=URL.createObjectURL(blob)

const a=document.createElement('a')
a.href=url
a.download='flashcards.pdf'
a.click()

})


/* CSV */

document.getElementById('downloadCsvBtn')?.addEventListener('click',async()=>{

const cards=collectCards()

const res=await fetch('/export/csv',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({cards})
})

const blob=await res.blob()
const url=URL.createObjectURL(blob)

const a=document.createElement('a')
a.href=url
a.download='flashcards.csv'
a.click()

})


/* Batch */

document.getElementById('batchBtn')?.addEventListener('click',async()=>{

const form=document.getElementById('flashcard-form')
const fd=new FormData(form)

const file=document.getElementById('topics_file').files[0]

if(!file)return alert("Upload a CSV/TXT file first")

fd.set('topics_file',file)

const res=await fetch('/batch',{method:'POST',body:fd})

const blob=await res.blob()

const url=URL.createObjectURL(blob)

const a=document.createElement('a')
a.href=url
a.download='flashcards_batch.csv'
a.click()

})

</script>

</body>
</html>
